<!DOCTYPE html>
<html lang="en-AU">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Great Aussie Slang Dictionary</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Main Dashboard -->
    <main class="main-content-display">
        <!-- Your Header/Dictionary Content -->
        <header>
            <h1>Aussie Slang Dictionary</h1>
        </header>

        <!-- Your Existing Filter Buttons -->
        <div class="filters">
            <button class="filter-btn active" data-category="all">All</button>
            <button class="filter-btn" data-category="core-phrases">Greetings</button>
            <!-- Add your other buttons here -->
        </div>

        <!-- Dictionary Grid -->
        <div id="slang-grid-root" class="grid-container"></div>

        <!-- Quiz Navigation Button -->
        <section class="quiz-nav-section" style="text-align: center; margin: 40px 0;">
            <button id="quiz-nav-btn" class="primary-btn">Take the Aussie Slang Quiz! 🦘</button>
        </section>
    </main>

    <!-- New Quiz Screen (Hidden by default) -->
    <section id="quiz-screen" class="hidden-screen">
        <div class="quiz-container">
            <button id="back-to-dashboard-btn" class="secondary-btn">← Back to Dashboard</button>
            <div id="progress-bar-container" style="background: #eee; height: 10px; margin: 20px 0;">
                <div id="progress-bar" style="height: 100%; background: #ffcc00; width: 0%; transition: width 0.3s;"></div>
            </div>
            <h2 id="quiz-question">Loading question...</h2>
            <div id="options-grid" class="options-grid"></div>
        </div>
    </section>

    <!-- Ensure your script is linked at the bottom -->
   <script src="dictionary-data.js"></script> 
   <script src="data.js"></script>
</body>
</html>
